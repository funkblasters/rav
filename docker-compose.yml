version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rav_postgres
    environment:
      POSTGRES_USER: rav_user
      POSTGRES_PASSWORD: rav_password
      POSTGRES_DB: rav_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rav_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
