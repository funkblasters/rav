[tools]
node = "22"

[env]
NODE_ENV = "development"

[tasks.dev]
description = "Start both frontend and backend"
run = """
  set -e
  npm -w backend run dev &
  npm -w frontend run dev &
  wait
"""

[tasks.db-migrate]
description = "Run initial database migration"
dir = "backend"
run = "npx prisma migrate deploy"
