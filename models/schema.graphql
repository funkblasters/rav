### ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime

### ─── Auth ───────────────────────────────────────────────────────────────────

type AuthPayload {
  token: String!
  user: User!
}

### ─── User ───────────────────────────────────────────────────────────────────

enum Role {
  ADMIN
  MEMBER
}

enum ClubRole {
  CHAIRMAN
  VICE_CHAIRMAN
  HONORARY_CHAIRMAN
  TREASURER
  SECRETARY
  ORDINARY_ASSOCIATE
}

enum UserStatus {
  REGISTERED
  PENDING
  EXTERNAL
}

type User {
  id: ID!
  email: String
  displayName: String!
  role: Role!
  clubRole: ClubRole!
  cardNumber: String
  createdAt: DateTime!
  status: UserStatus!
}

type PublicUser {
  id: ID!
  displayName: String!
  role: Role!
  clubRole: ClubRole!
  createdAt: DateTime!
}

type ContributionByContinent {
  continent: String!
  count: Int!
}

type UserProfile {
  id: ID!
  displayName: String!
  email: String
  role: Role!
  clubRole: ClubRole!
  cardNumber: String
  createdAt: DateTime!
  flagsCount: Int!
  lastContribution: DateTime
  contributionsByContinent: [ContributionByContinent!]!
}

### ─── Flag ───────────────────────────────────────────────────────────────────

type Flag {
  id: ID!
  name: String!
  countryCode: String!      # ISO 3166-1 alpha-2
  subdivisionCode: String   # ISO 3166-2 (e.g. "IT-LO")
  city: String
  latitude: Float
  longitude: Float
  imageUrl: String
  acquiredAt: DateTime!
  isPublic: Boolean!
  isVariant: Boolean!
  addedBy: User!
  description: String
  continent: String
  publishedAt: DateTime
  togetherWith: [User!]!
  contributors: [User!]!
}

type FlagPreview {
  id: ID!
  name: String!
  imageUrl: String
  acquiredAt: DateTime!
  publishedAt: DateTime
  addedBy: User!
  description: String
  togetherWith: [User!]!
  contributors: [User!]!
}

type FlagGeo {
  countryCode: String!
}

### ─── Club ───────────────────────────────────────────────────────────────────

type Event {
  id: ID!
  title: String!
  description: String
  date: DateTime!
  location: String
  createdBy: User!
}

### ─── Admin ──────────────────────────────────────────────────────────────────

type Invite {
  email: String!
  clubRole: ClubRole!
  cardNumber: String
}

type ImportFlagError {
  row: Int!
  flagName: String!
  reason: String!
}

type ImportFlagsResult {
  flagsImported: Int!
  usersCreated: Int!
  errors: [ImportFlagError!]!
}

type FailedImport {
  id: ID!
  row: Int!
  flagName: String!
  reason: String!
  rawData: String!
  createdAt: DateTime!
}

### ─── News ───────────────────────────────────────────────────────────────────

type NewsItem {
  title: String!
  link: String!
  pubDate: DateTime!
  source: String
  imageUrl: String
  body: String
}

type MemberStats {
  id: ID!
  displayName: String!
  clubRole: ClubRole!
  flagsCount: Int!
}

### ─── Queries ────────────────────────────────────────────────────────────────

type Query {
  me: User
  users: [PublicUser!]!
  adminUsers: [User!]!
  myProfile: UserProfile
  events: [Event!]!
  event(id: ID!): Event
  flags: [Flag!]!
  allFlags: [Flag!]!
  flagsGeo: [FlagGeo!]!
  flagsGeoAll: [FlagGeo!]!
  flag(id: ID!): Flag
  lastFlag: FlagPreview
  mostWantedFlag: FlagPreview
  myFlags: [Flag!]!
  newsItems(limit: Int): [NewsItem!]!
  featuredNewsItem: NewsItem
  topMembers(limit: Int): [MemberStats!]!
  invites: [Invite!]!
  failedImports: [FailedImport!]!
}

### ─── Mutations ──────────────────────────────────────────────────────────────

type Mutation {
  login(email: String!, password: String!): AuthPayload!
  register(email: String!, password: String!, displayName: String!): AuthPayload!

  createEvent(title: String!, description: String, date: String!, location: String): Event!
  updateEvent(id: ID!, title: String, description: String, date: String, location: String): Event!
  deleteEvent(id: ID!): Boolean!

  addFlag(
    name: String!
    countryCode: String
    subdivisionCode: String
    city: String
    latitude: Float
    longitude: Float
    imageUrl: String
    acquiredAt: Int!
    isPublic: Boolean
    description: String
    continent: String
    addedByUserId: ID
    togetherWithUserIds: [ID!]
  ): Flag!
  deleteFlag(id: ID!): Boolean!
  makePublic(flagId: ID!): Flag!
  updateFlagImageUrl(id: ID!, imageUrl: String): Flag!
  updateFlag(id: ID!, name: String, imageUrl: String, countryCode: String, subdivisionCode: String, continent: String): Flag!

  addInvite(email: String!, clubRole: ClubRole!, cardNumber: String): Invite!
  removeInvite(email: String!): Boolean!

  resetUserPassword(userId: ID!, newPassword: String!): Boolean!
  assignExternalEmail(userId: ID!, email: String!): User!
  clearFailedImport(id: ID!): Boolean!
  clearAllFailedImports: Boolean!

  setMostWanted(name: String!, imageUrl: String, acquiredAt: Int!, description: String): FlagPreview!
  clearMostWanted: Boolean!

  setFeaturedNews(title: String!, link: String!, imageUrl: String, body: String): NewsItem!
  clearFeaturedNews: Boolean!

  refresh: AuthPayload!
  logout: Boolean!
}
